<script>
document.addEventListener("DOMContentLoaded", function() {
  function applyOpalBrandStyling(root) {
    const skipTags = new Set(["SCRIPT", "STYLE", "NOSCRIPT", "TEXTAREA", "PRE"]);
    const opalRegex = /\b(opal)\b/gi;

    const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
      acceptNode(node) {
        if (!node.nodeValue || !node.nodeValue.toLowerCase().includes("opal")) {
          return NodeFilter.FILTER_REJECT;
        }

        const parent = node.parentElement;
        if (!parent) {
          return NodeFilter.FILTER_REJECT;
        }

        if (skipTags.has(parent.tagName)) {
          return NodeFilter.FILTER_REJECT;
        }

        if (parent.closest(".opal-brand")) {
          return NodeFilter.FILTER_REJECT;
        }

        if (parent.namespaceURI !== "http://www.w3.org/1999/xhtml") {
          return NodeFilter.FILTER_REJECT;
        }

        return NodeFilter.FILTER_ACCEPT;
      }
    });

    const textNodes = [];
    while (walker.nextNode()) {
      textNodes.push(walker.currentNode);
    }

    textNodes.forEach(function(node) {
      const text = node.nodeValue;
      opalRegex.lastIndex = 0;
      if (!opalRegex.test(text)) {
        return;
      }

      const fragment = document.createDocumentFragment();
      let lastIndex = 0;
      let match;
      opalRegex.lastIndex = 0;

      while ((match = opalRegex.exec(text)) !== null) {
        if (match.index > lastIndex) {
          fragment.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
        }

        const span = document.createElement("span");
        span.className = "opal-brand";
        span.textContent = match[0];
        fragment.appendChild(span);

        lastIndex = opalRegex.lastIndex;
      }

      if (lastIndex < text.length) {
        fragment.appendChild(document.createTextNode(text.slice(lastIndex)));
      }

      node.parentNode.replaceChild(fragment, node);
    });
  }

  applyOpalBrandStyling(document.body);

  // Select all anchor tags with href starting with http (external links only)
  document.querySelectorAll("a[href^='http']").forEach(function(link) {
    // Ignore links to the current site's domain
    if (!link.href.includes(window.location.hostname)) {
      link.setAttribute('target', '_blank');
      link.setAttribute('rel', 'noopener');
    }
  });
  
  // Add smooth scrolling for internal links
  document.querySelectorAll('a[href^="#"]').forEach(function(link) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      const targetId = this.getAttribute('href').substring(1);
      const targetElement = document.getElementById(targetId);
      if (targetElement) {
        targetElement.scrollIntoView({ 
          behavior: 'smooth',
          block: 'start'
        });
      }
    });
  });
  
  // Add scroll to top functionality
  const scrollToTopBtn = document.createElement('button');
  scrollToTopBtn.className = 'scroll-to-top';
  scrollToTopBtn.innerHTML = '↑';
  scrollToTopBtn.setAttribute('aria-label', 'Scroll to top');
  scrollToTopBtn.style.fontSize = '20px';
  scrollToTopBtn.style.fontWeight = 'bold';
  document.body.appendChild(scrollToTopBtn);
  
  window.addEventListener('scroll', function() {
    if (window.pageYOffset > 300) {
      scrollToTopBtn.classList.add('visible');
    } else {
      scrollToTopBtn.classList.remove('visible');
    }
  });
  
  scrollToTopBtn.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
});
</script>
